services:
  - type: web
    name: helpdesk
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: helpdesk-db
          property: connectionString
      - key: CLIENT_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SUPPORT_EMAIL
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: COMPANY_NAME
        sync: false
      - key: COMPANY_DOMAIN
        sync: false
      - key: SENTRY_DSN
        value: ""
      - key: SENTRY_ENVIRONMENT
        value: production

databases:
  - name: helpdesk-db
    plan: free
    databaseName: helpdesk
    user: helpdesk
